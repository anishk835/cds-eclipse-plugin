name: CDS Editor CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven local repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run MWE2 Code Generation
        run: |
          mvn --batch-mode \
              generate-sources \
              -pl plugins/org.example.cds \
              -am \
              -Dmaven.test.skip=true

      - name: Build and Test (Tycho)
        run: |
          mvn --batch-mode \
              clean verify \
              -Dmaven.test.failure.ignore=false

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/surefire-reports/*.xml'

      - name: Upload P2 Update Site
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cds-editor-p2-site
          path: releng/org.example.cds.p2/target/repository/
          retention-days: 30

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 14
